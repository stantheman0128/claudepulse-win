name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build self-contained (full)
        run: |
          dotnet publish ClaudePulse/ClaudePulse.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o release-full

      - name: Build framework-dependent (lite)
        run: |
          dotnet publish ClaudePulse/ClaudePulse.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o release-lite

      - name: Create zip archives
        shell: bash
        run: |
          cd release-full && 7z a ../ClaudePulse-${{ github.ref_name }}-full.zip ClaudePulse.exe && cd ..
          cd release-lite && 7z a ../ClaudePulse-${{ github.ref_name }}-lite.zip ClaudePulse.exe && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ClaudePulse-${{ github.ref_name }}-full.zip
            ClaudePulse-${{ github.ref_name }}-lite.zip
          body: |
            ## ClaudePulse ${{ github.ref_name }}

            ### Downloads
            - **`ClaudePulse-${{ github.ref_name }}-full.zip`** - Self-contained (no .NET runtime needed, ~150MB)
            - **`ClaudePulse-${{ github.ref_name }}-lite.zip`** - Requires .NET 6.0 runtime (~200KB)

            ---
            *Auto-generated by GitHub Actions*
